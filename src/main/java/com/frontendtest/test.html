<!DOCTYPE html>
<html>
<body>
    <h2>VaultGuard Live Alert Monitor</h2>
    <div id="log" style="background:black; color:lime; padding:20px; font-family:monospace;">
        <p>> Listening for VaultGuard alerts...</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        var socket = new SockJS('http://localhost:8081/ws');
        var stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/alerts', function (msg) {
                document.getElementById('log').innerHTML += "<p style='color:red;'>[ALERT] " + msg.body + "</p>";
            });
        });
    </script>
</body>
</html>
